# Full multi-server deployment, locally reproducible:
#
#   browser ──> gateway (caddy :8080) ──┬──> backend1 :3001 ─┐
#                serves client +         └──> backend2 :3001 ─┴──> redis :6379
#                load-balances ws                              (adapter + presence)
#
# Bring it up with:   docker compose up --build
# Then open:          http://localhost:8080
#
# Kill a replica to see crash recovery:   docker compose stop backend1

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ['redis-server', '--save', '', '--appendonly', 'no']
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  backend1:
    build: ./server
    environment:
      NODE_ENV: production
      REDIS_ENABLED: 'true'
      REDIS_URL: redis://redis:6379
      SERVER_ID: backend1
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  backend2:
    build: ./server
    environment:
      NODE_ENV: production
      REDIS_ENABLED: 'true'
      REDIS_URL: redis://redis:6379
      SERVER_ID: backend2
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  gateway:
    build:
      context: .
      dockerfile: caddy/Dockerfile
    ports:
      - '8080:80'
    depends_on:
      - backend1
      - backend2
    restart: unless-stopped
