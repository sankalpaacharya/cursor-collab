services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ['redis-server', '--save', '', '--appendonly', 'no']
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  backend1:
    build: ./server
    environment:
      NODE_ENV: production
      REDIS_ENABLED: 'true'
      REDIS_URL: redis://redis:6379
      SERVER_ID: backend1
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  backend2:
    build: ./server
    environment:
      NODE_ENV: production
      REDIS_ENABLED: 'true'
      REDIS_URL: redis://redis:6379
      SERVER_ID: backend2
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  gateway:
    build:
      context: .
      dockerfile: caddy/Dockerfile
    ports:
      - '8080:80'
    depends_on:
      - backend1
      - backend2
    restart: unless-stopped
