# Nginx as the single public entry point:
#   - serves the built React client (static files)
#   - load-balances Socket.IO traffic across the backend replicas
#
# This demonstrates the multi-server deployment: clients connect to one URL and
# nginx fans them out across backend1 / backend2, which coordinate via Redis.

upstream cursor_backend {
    # Sticky sessions. Socket.IO's default transport starts with HTTP long-polling
    # and then upgrades to WebSocket; during that handshake several requests must
    # land on the SAME replica. ip_hash pins each client IP to one upstream.
    #
    # Alternative: force WebSocket-only on the client (transports: ['websocket'])
    # and stickiness is no longer required — see the README.
    ip_hash;

    server backend1:3001 max_fails=3 fail_timeout=10s;
    server backend2:3001 max_fails=3 fail_timeout=10s;
}

server {
    listen 80;
    server_name _;

    # ---- Static client ----
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---- Socket.IO (WebSocket + polling) -> load-balanced backends ----
    location /socket.io/ {
        proxy_pass http://cursor_backend;
        proxy_http_version 1.1;

        # Required for the WebSocket upgrade handshake.
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Keep idle WebSocket connections open.
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # ---- Health / metrics passthrough ----
    location = /healthz { proxy_pass http://cursor_backend; }
    location = /stats   { proxy_pass http://cursor_backend; }
}
