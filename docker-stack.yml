services:
  redis:
    image: redis:7-alpine
    command: ['redis-server', '--save', '', '--appendonly', 'no']
    networks:
      - cursornet
    deploy:
      replicas: 1
      restart_policy:
        condition: any

  backend:
    image: cursor-backend:latest
    environment:
      NODE_ENV: production
      REDIS_ENABLED: 'true'
      REDIS_URL: redis://redis:6379
      CORS_ORIGIN: '*'
    ports:
      - target: 3001
        published: 3001
        protocol: tcp
        mode: ingress
    networks:
      - cursornet
    deploy:
      replicas: 3
      restart_policy:
        condition: any
        delay: 5s

  gateway:
    image: cursor-gateway:latest
    ports:
      - target: 80
        published: ${GATEWAY_PORT:-8080}
        protocol: tcp
        mode: host
    configs:
      - source: caddyfile
        target: /etc/caddy/Caddyfile
    networks:
      - cursornet
    deploy:
      replicas: 1
      restart_policy:
        condition: any

networks:
  cursornet:
    driver: overlay

configs:
  caddyfile:
    file: ./caddy/Caddyfile.split
